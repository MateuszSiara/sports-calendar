<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Add New Event</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f5f5f5; }
    nav { background-color: #1a1a2e; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
    nav a { color: white; text-decoration: none; margin-right: 20px; font-size: 16px; }
    nav a:hover { color: #e94560; }
    .card { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 600px; }
    .card h2 { color: #1a1a2e; border-bottom: 2px solid #e94560; padding-bottom: 10px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-weight: bold; color: #666; font-size: 13px; text-transform: uppercase; margin-bottom: 6px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; box-sizing: border-box; }
    input:focus, select:focus { outline: none; border-color: #e94560; }
    .btn { background-color: #e94560; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
    .btn:hover { background-color: #c73652; }
    .btn-back { background-color: #1a1a2e; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
  </style>
</head>
<body>

<nav>
  <a href="/events">Sports Calendar</a>
  <a href="#">Home</a>
  <a href="#">Competitions</a>
  <a href="#">Teams</a>
</nav>

<a href="/events" class="btn-back">← Back to list</a>

<div class="card">
  <h2>Add New Event</h2>

  <form th:action="@{/events}" th:object="${request}" method="post">

    <div class="field">
      <label>Date</label>
      <input type="date" th:field="*{dateVenue}" required/>
    </div>

    <div class="field">
      <label>Time (UTC)</label>
      <input type="time" th:field="*{timeVenueUtc}" required/>
    </div>

    <div class="field">
      <label>Season Year</label>
      <input type="number" th:field="*{seasonYear}" placeholder="2024" required/>
    </div>

    <div class="field">
      <label>Status</label>
      <select th:field="*{status}" required>
        <option value="">-- Select status --</option>
        <option value="scheduled">Scheduled</option>
        <option value="played">Played</option>
      </select>
    </div>

    <div class="field">
      <label>Competition</label>
      <select th:field="*{competitionId}" required>
        <option value="">-- Select competition --</option>
        <option th:each="c : ${competitions}"
                th:value="${c.id}"
                th:text="${c.originCompetitionName}"></option>
      </select>
    </div>

    <div class="field">
      <label>Stage</label>
      <select th:field="*{stageId}" required>
        <option value="">-- Select stage --</option>
        <option th:each="s : ${stages}"
                th:value="${s.id}"
                th:text="${s.name}"></option>
      </select>
    </div>

    <div class="field">
      <label>Home Team</label>
      <select th:field="*{homeTeamId}">
        <option value="">-- TBD --</option>
        <option th:each="t : ${teams}"
                th:value="${t.id}"
                th:text="${t.name}"></option>
      </select>
    </div>

    <div class="field">
      <label>Away Team</label>
      <select th:field="*{awayTeamId}">
        <option value="">-- TBD --</option>
        <option th:each="t : ${teams}"
                th:value="${t.id}"
                th:text="${t.name}"></option>
      </select>
    </div>

    <button type="submit" class="btn">Save Event</button>

  </form>
</div>

</body>
</html>
