services:
  postgres:
    image: postgres:16
    container_name: sports-calendar-db
    environment:
      POSTGRES_DB: sports_calendar
      POSTGRES_USER: sportradar
      POSTGRES_PASSWORD: sportradar123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: